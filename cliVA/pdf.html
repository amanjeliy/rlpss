<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Військово-обліковий документ</title>

    <script src="../js/pdf.min.js"></script>

    <style>
        :root {
            --ios-blue: #007AFF;
            --bg-gray: #F2F2F7;
            --header-bg: rgba(255, 255, 255, 0.85);
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-gray);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        .header {
            position: fixed;
            top: 0;
            width: 100%;
            height: calc(60px + env(safe-area-inset-top));
            padding-top: env(safe-area-inset-top);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-left: 16px;
            padding-right: 16px;
            box-sizing: border-box;
            background: var(--header-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 100;
            border-bottom: 0.5px solid #d1d1d6;
        }

        .header-title {
            font-size: 17px;
            font-weight: 600;
            color: #000;
            display: flex;
            align-items: center;
            gap: 4px;
            max-width: 70%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .done-btn {
            color: var(--ios-blue);
            font-size: 17px;
            font-weight: 600;
            background: none;
            border: none;
            padding: 8px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        #viewport {
            width: 100%;
            height: 100%;
            overflow: auto;
            padding: calc(75px + env(safe-area-inset-top)) 10px calc(100px + env(safe-area-inset-bottom)) 10px;
            box-sizing: border-box;
            display: block;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-x pan-y;
        }

        #canvas-container {
            background: white;
            margin: 0 auto;
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.12);
            border-radius: 6px;
            line-height: 0;
            transform-origin: top center;
        }

        canvas {
            display: block;
            border-radius: 6px;
        }

        .toolbar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: calc(70px + env(safe-area-inset-bottom));
            padding-bottom: env(safe-area-inset-bottom);
            background: var(--header-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-left: 35px;
            padding-right: 35px;
            box-sizing: border-box;
            border-top: 0.5px solid #d1d1d6;
            z-index: 100;
        }

        .icon-btn {
            background: none;
            border: none;
            padding: 10px;
            color: var(--ios-blue);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .icon {
            width: 26px;
            height: 26px;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.5;
        }

        .page-counter {
            font-size: 13px;
            color: #555;
            min-width: 64px;
            text-align: center;
        }
    </style>
</head>

<body>
<div class="header">
    <button class="done-btn" type="button" onclick="goBack()">Done</button>

    <div class="header-title">
        Військово-обліковий документ
        <svg width="10" height="10" viewBox="0 0 10 10" fill="#8E8E93">
            <path d="M1 3l4 4 4-4"></path>
        </svg>
    </div>

    <button class="done-btn" type="button" onclick="resetZoom()">Reset</button>
</div>

<div id="viewport">
    <div id="canvas-container">
        <canvas id="pdf-canvas"></canvas>
    </div>
</div>

<div class="toolbar">
    <button class="icon-btn" type="button" onclick="sharePDF()" aria-label="Share">
        <svg class="icon" viewBox="0 0 24 24">
            <path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8m-16-4l8-8 8 8m-8-8v13"></path>
        </svg>
    </button>

    <button class="icon-btn" type="button" onclick="prevPage()" aria-label="Previous page">
        <svg class="icon" viewBox="0 0 24 24">
            <path d="M15 18l-6-6 6-6"></path>
        </svg>
    </button>

    <div id="page-counter" class="page-counter">1 / 1</div>

    <button class="icon-btn" type="button" onclick="nextPage()" aria-label="Next page">
        <svg class="icon" viewBox="0 0 24 24">
            <path d="M9 18l6-6-6-6"></path>
        </svg>
    </button>

    <button class="icon-btn" type="button" onclick="zoomIn()" aria-label="Zoom in">
        <svg class="icon" viewBox="0 0 24 24" style="stroke-width: 2;">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="M11 8v6"></path>
            <path d="M8 11h6"></path>
            <path d="M21 21l-4.35-4.35"></path>
        </svg>
    </button>
</div>

<script>
  const url = 'vod.pdf';

  let pdfDoc = null;
  let scale = 1.0;
  let initialScale = 1.0;
  let currentPage = 1;
  let lastTap = 0;
  let isRendering = false;
  let pendingPage = null;

  const view = document.getElementById('viewport');
  const canvas = document.getElementById('pdf-canvas');
  const container = document.getElementById('canvas-container');
  const pageCounter = document.getElementById('page-counter');
  const ctx = canvas.getContext('2d');

  const pdfjsLib = window['pdfjs-dist/build/pdf'];
  pdfjsLib.GlobalWorkerOptions.workerSrc = '../js/pdf.worker.min.js';

  pdfjsLib.getDocument(url).promise.then(function(pdf) {
    pdfDoc = pdf;

    pdf.getPage(1).then(function(page) {
      const unscaledViewport = page.getViewport({ scale: 1 });
      const screenWidth = window.innerWidth - 32;

      scale = screenWidth / unscaledViewport.width;
      initialScale = scale;

      renderPage(1);
    });
  });

  function renderPage(pageNumber) {
    if (!pdfDoc) return;

    if (isRendering) {
      pendingPage = pageNumber;
      return;
    }

    isRendering = true;

    pdfDoc.getPage(pageNumber).then(function(page) {
      const rotation = page.rotate;
      const dpr = window.devicePixelRatio || 1;
      const viewport = page.getViewport({
        scale: scale,
        rotation: rotation
      });

      canvas.width = viewport.width * dpr;
      canvas.height = viewport.height * dpr;

      canvas.style.width = viewport.width + 'px';
      canvas.style.height = viewport.height + 'px';

      const renderContext = {
        canvasContext: ctx,
        viewport: viewport,
        transform: [dpr, 0, 0, dpr, 0, 0]
      };

      page.render(renderContext).promise.then(function() {
        currentPage = pageNumber;
        pageCounter.textContent = currentPage + ' / ' + pdfDoc.numPages;
        isRendering = false;

        if (pendingPage !== null) {
          const nextPendingPage = pendingPage;
          pendingPage = null;
          renderPage(nextPendingPage);
        }
      });
    });
  }

  function prevPage() {
    if (!pdfDoc || currentPage <= 1) return;
    renderPage(currentPage - 1);
  }

  function nextPage() {
    if (!pdfDoc || currentPage >= pdfDoc.numPages) return;
    renderPage(currentPage + 1);
  }

  function zoomIn() {
    scale = Math.min(scale * 1.25, initialScale * 5);
    container.style.transform = 'scale(1)';
    renderPage(currentPage);
  }

  function resetZoom() {
    scale = initialScale;
    container.style.transform = 'scale(1)';
    renderPage(currentPage);
    view.scrollTop = 0;
    view.scrollLeft = 0;
  }

  function goBack() {
    if (window.history.length > 1) {
      window.history.back();
    } else {
      window.location.href = 'index.html';
    }
  }

  function sharePDF() {
    const absoluteUrl = new URL(url, window.location.href).href;

    if (navigator.share) {
      navigator.share({
        title: 'Військово-обліковий документ',
        url: absoluteUrl
      });
    } else {
      window.open(absoluteUrl, '_blank');
    }
  }

  view.addEventListener('gesturestart', function(e) {
    e.preventDefault();
    container.style.transition = 'none';
  });

  view.addEventListener('gesturechange', function(e) {
    e.preventDefault();
    container.style.transform = 'scale(' + e.scale + ')';
  });

  view.addEventListener('gestureend', function(e) {
    e.preventDefault();

    const newScale = scale * e.scale;
    scale = Math.min(Math.max(newScale, initialScale * 0.8), initialScale * 5);

    container.style.transform = 'scale(1)';
    renderPage(currentPage);
  });

  view.addEventListener('touchend', function(e) {
    const now = new Date().getTime();
    const timeSince = now - lastTap;

    if (timeSince < 300 && timeSince > 0) {
      e.preventDefault();
      resetZoom();
    }

    lastTap = now;
  });

  window.addEventListener('resize', function() {
    if (!pdfDoc) return;

    pdfDoc.getPage(currentPage).then(function(page) {
      const unscaledViewport = page.getViewport({ scale: 1 });
      const screenWidth = window.innerWidth - 32;
      const zoomRatio = scale / initialScale;

      initialScale = screenWidth / unscaledViewport.width;
      scale = initialScale * zoomRatio;

      renderPage(currentPage);
    });
  });
</script>
</body>
</html>
